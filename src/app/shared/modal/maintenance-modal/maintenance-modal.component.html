<div *ngIf="showModal" class="maintenance-overlay">
  <div class="maintenance-modal">
    <div class="maintenance-icon">
      <svg width="50" height="50" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="#FF6B35" stroke="#FF6B35" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 17L12 22L22 17" stroke="#FF6B35" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 12L12 17L22 12" stroke="#FF6B35" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="maintenance-content">
      <h1 class="maintenance-title">🔧 Maintenance en cours</h1>
      
      <p class="maintenance-message">
        {{ maintenanceStatus.message || 'L\'application est actuellement en maintenance. Veuillez réessayer dans quelques instants.' }}
      </p>

      <div *ngIf="maintenanceStatus.end_time" class="maintenance-time">
        <div class="time-icon">⏰</div>
        <div class="time-text">
          <span class="time-label">Retour prévu :</span>
          <span class="time-value">{{ getFormattedEndTime() }}</span>
        </div>
      </div>

      <button class="refresh-button" (click)="refresh()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M21.5 2V8M21.5 8H15.5M21.5 8L18.3 5.5C16.6 3.9 14.3 3 12 3C7 3 3 7 3 12C3 17 7 21 12 21C16.4 21 20 17.9 20.7 13.8" 
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Vérifier à nouveau
      </button>

      <p class="maintenance-footer">
        Merci de votre compréhension 🙏
      </p>
    </div>
  </div>
</div>
