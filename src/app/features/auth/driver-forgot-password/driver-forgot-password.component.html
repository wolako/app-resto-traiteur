<div class="dl-page">
  <div class="dl-brand">
    <div class="dl-brand-icon">🏍️</div>
    <div class="dl-brand-text">
      <span class="dl-brand-name">RestoTraiteur</span>
      <span class="dl-brand-sub">Espace Livreur</span>
    </div>
  </div>

  <div class="dl-card">
    <div class="dl-card-head">
      <h1>Mot de passe oublié</h1>
      <p>Entrez l'email associé à votre compte livreur</p>
    </div>

    <div class="dl-error" *ngIf="errorMsg">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <span>{{ errorMsg }}</span>
    </div>

    <!-- Succès -->
    <div *ngIf="sent" class="alert alert-success d-flex gap-2">
      <i class="bi bi-envelope-check-fill fs-5"></i>
      <div>
        <strong>Email envoyé !</strong><br>
        <small>Si cet email correspond à un compte livreur, vous recevrez un lien de réinitialisation dans quelques instants. Vérifiez aussi vos spams.</small>
      </div>
    </div>

    <div class="dl-form" *ngIf="!sent">
      <div class="dl-field">
        <label class="dl-label"><i class="bi bi-envelope-fill"></i> Email</label>
        <input type="email" class="dl-input" [(ngModel)]="email"
          placeholder="votre@email.com" (keyup.enter)="submit()">
      </div>

      <button class="dl-btn" (click)="submit()" [disabled]="loading || !email">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        <i *ngIf="!loading" class="bi bi-send-fill me-2"></i>
        {{ loading ? 'Envoi...' : 'Envoyer le lien' }}
      </button>
    </div>

    <div class="dl-card-foot">
      <a routerLink="/driver/login"><i class="bi bi-arrow-left"></i> Retour à la connexion</a>
    </div>
  </div>
</div>
