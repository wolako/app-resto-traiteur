<div class="dl-page">
  <div class="dl-brand">
    <div class="dl-brand-icon">🏍️</div>
    <div class="dl-brand-text">
      <span class="dl-brand-name">RestoTraiteur</span>
      <span class="dl-brand-sub">Espace Livreur</span>
    </div>
  </div>

  <div class="dl-card">
    <div class="dl-card-head">
      <h1>Nouveau mot de passe</h1>
    </div>

    <div *ngIf="verifying" class="text-center py-4">
      <div class="spinner-border" style="color:var(--rt-primary)"></div>
      <p class="mt-2">Vérification du lien...</p>
    </div>

    <div class="dl-error" *ngIf="!verifying && !tokenValid">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <span>{{ errorMsg }}</span>
    </div>

    <div *ngIf="!verifying && !tokenValid" class="dl-card-foot">
      <a routerLink="/driver/forgot-password">Demander un nouveau lien</a>
    </div>

    <div *ngIf="success" class="alert alert-success d-flex gap-2">
      <i class="bi bi-check-circle-fill fs-5"></i>
      <div><strong>Mot de passe modifié !</strong><br><small>Redirection vers la connexion...</small></div>
    </div>

    <div class="dl-form" *ngIf="!verifying && tokenValid && !success">
      <div class="dl-error" *ngIf="errorMsg">
        <i class="bi bi-exclamation-triangle-fill"></i><span>{{ errorMsg }}</span>
      </div>

      <div class="dl-field">
        <label class="dl-label">Nouveau mot de passe</label>
        <input type="password" class="dl-input" [(ngModel)]="newPassword" placeholder="Minimum 6 caractères">
      </div>
      <div class="dl-field">
        <label class="dl-label">Confirmer le mot de passe</label>
        <input type="password" class="dl-input" [(ngModel)]="confirmPassword" placeholder="Répétez le mot de passe">
      </div>

      <button class="dl-btn" (click)="submit()" [disabled]="loading || !newPassword || !confirmPassword">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        <i *ngIf="!loading" class="bi bi-shield-check me-2"></i>
        {{ loading ? 'Enregistrement...' : 'Réinitialiser' }}
      </button>
    </div>
  </div>
</div>
